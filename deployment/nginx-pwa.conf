# Salin location berikut ke konfigurasi website aaPanel.
# Ganti /www/wwwroot/DEPLOY_ROOT dengan nilai GitHub Secret VPS_DEPLOY_ROOT.
# Directive root harus menunjuk ke symlink "current" yang dibuat script deployment.

root /www/wwwroot/DEPLOY_ROOT/current;
index index.html;

location = /sw.js {
    try_files $uri =404;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Service-Worker-Allowed "/" always;
    expires -1;
}

location = /index.html {
    try_files $uri =404;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    expires -1;
}

location = /manifest.json {
    try_files $uri =404;
    add_header Cache-Control "no-cache" always;
    expires -1;
}

location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    expires 1y;
}

location / {
    try_files $uri $uri/ /index.html;
}
